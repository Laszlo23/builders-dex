# HTTP — ACME + redirect
server {
    listen 80;
    listen [::]:80;
    server_name dex.buildingcultureid.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to Builders DEX (pm2 :3050)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dex.buildingcultureid.space;

    ssl_certificate /etc/letsencrypt/live/dex.buildingcultureid.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dex.buildingcultureid.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}
